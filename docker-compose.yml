services:
  # ========== 数据库 ==========
  mysql-user:
    image: mysql:8.0
    container_name: movie-mysql-user
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: movie_user
    ports:
      - "3307:3306"
    volumes:
      - ./docker/mysql/init/01_movie_user.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-user-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  mysql-movie:
    image: mysql:8.0
    container_name: movie-mysql-movie
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: movie_movie
    ports:
      - "3308:3306"
    volumes:
      - ./docker/mysql/init/02_movie_movie.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-movie-data:/var/lib/mysql

  mysql-review:
    image: mysql:8.0
    container_name: movie-mysql-review
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: movie_review
    ports:
      - "3309:3306"
    volumes:
      - ./docker/mysql/init/03_movie_review.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-review-data:/var/lib/mysql

  mysql-watchlist:
    image: mysql:8.0
    container_name: movie-mysql-watchlist
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: movie_watchlist
    ports:
      - "3310:3306"
    volumes:
      - ./docker/mysql/init/04_movie_watchlist.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-watchlist-data:/var/lib/mysql

  mysql-ranking:
    image: mysql:8.0
    container_name: movie-mysql-ranking
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: movie_ranking
    ports:
      - "3311:3306"
    volumes:
      - ./docker/mysql/init/05_movie_ranking.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-ranking-data:/var/lib/mysql

  # ========== 注册中心 + 配置中心 ==========
  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: movie-nacos
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: nacos
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - nacos-data:/home/nacos/data
    depends_on:
      mysql-user:
        condition: service_healthy

  # ========== 缓存 ==========
  redis:
    image: redis:7-alpine
    container_name: movie-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis-data:/data

  # ========== 消息队列 ==========
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: movie-rmq-namesrv
    command: sh mqnamesrv
    ports:
      - "9876:9876"

  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: movie-rmq-broker
    command: sh mqbroker -n rocketmq-namesrv:9876
    ports:
      - "10911:10911"
      - "10909:10909"
    environment:
      JAVA_OPT_EXT: "-server -Xms512m -Xmx512m"
    depends_on:
      - rocketmq-namesrv

volumes:
  mysql-user-data:
  mysql-movie-data:
  mysql-review-data:
  mysql-watchlist-data:
  mysql-ranking-data:
  nacos-data:
  redis-data:
